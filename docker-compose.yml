services:
  autofilm:
    image: yquark/autofilm:v2.3.0
    container_name: autofilm
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "8000:8000"
    volumes:
      - ./config:/config
      - ./media:/media
      - ./logs:/logs
    environment:
      TZ: Asia/Shanghai
      AUTOFILM_WEB_ENABLED: "true"
      AUTOFILM_WEB_HOST: 0.0.0.0
      AUTOFILM_WEB_PORT: "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
