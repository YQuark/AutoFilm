name: AutoFilm Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - app/version.py

jobs:
  Get-Version:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - name: Clone Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: APP Version
        id: version
        run: |
          APP_VERSION=$(cat app/version.py | sed -ne 's/APP_VERSION\s=\s"v\(.*\)"/\1/gp')
          echo "检测到版本号为 $APP_VERSION"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"

  Release-Docker-Builder:
    name: Build Docker Image
    needs: [ Get-Version ]
    uses: ./.github/workflows/docker-builder.yaml
    with:
      APP_VERSION: ${{ needs.Get-Version.outputs.app_version }}
      IS_LATEST: true
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  Run-CI:
    name: CI Check
    uses: ./.github/workflows/ci.yaml

  Create-Release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [ Get-Version, Release-Docker-Builder, Run-CI ]
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: v${{ needs.Get-Version.outputs.app_version }}
          name: v${{ needs.Get-Version.outputs.app_version }}
          body: ${{ github.event.commits[0].message || format('Release v{0}', needs.Get-Version.outputs.app_version) }}
          draft: false
          prerelease: false
