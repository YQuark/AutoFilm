name: AutoFilm Docker Builder

on:
  workflow_call:
    inputs:
      APP_VERSION:
        description: "用于Docker镜像版本的标签号"
        required: true
        type: string
      IS_LATEST:
        description: "是否发布为Docker镜像最新版本"
        required: true
        type: boolean
      MULTI_PLATFORM:
        description: "是否构建多架构镜像（amd64+arm64）"
        required: false
        type: boolean
        default: true
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

env:
  APP_VERSION: ${{ inputs.APP_VERSION }}
  IS_LATEST: ${{ inputs.IS_LATEST }}

jobs:
  Docker-build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    steps:
      - name: Show Information
        run: |
          echo "Docker镜像版本的标签号：${{ env.APP_VERSION }}"
          echo "是否发布为Docker镜像最新版本：${{ env.IS_LATEST }}"
          echo "多架构构建：${{ inputs.MULTI_PLATFORM }}"

      - name: Clone Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/autofilm
          tags: |
              type=raw,value=latest,enable=${{ env.IS_LATEST }}
              type=raw,value=${{ env.APP_VERSION }},enable=true

      - name: Set up QEMU
        if: inputs.MULTI_PLATFORM
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ inputs.MULTI_PLATFORM && 'linux/amd64,linux/arm64/v8' || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
